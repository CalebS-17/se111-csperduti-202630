<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W6 Pay Calculator</title>
</head>
<body>
    <h1>JavaScript Pay Calculator</h1>
    <!--
    <script src="script.js"></script>
    -->

    <script>

        //use prompt() to get: name, hours worked, and hourly rate from user
        var name = prompt("What is your name?: ")
        var hours = Number(prompt("How many hours do you work?: "))
        var rate = Number(prompt("What is your hourly rate?: "))



        //calculate gross (hours * rate), tax (gross * 0.2), and net (gross - tax)
        var gross = hours * rate;
        var tax = gross * 0.2;
        var net = gross - tax;


        //log the values to the console using console.log()
        console.log(`Gross Pay: ${gross.toFixed(2)}`)
        console.log(`Tax: ${tax.toFixed(2)}`)
        console.log(`Net Pay: ${net.toFixed(2)}`)


        //show the user the values using the alert()!
        alert(`Gross Pay: ${gross.toFixed(2)}\nTax: ${tax.toFixed(2)}\nNet Pay: ${net.toFixed(2)}`)

    </script>

</body>
</html>
