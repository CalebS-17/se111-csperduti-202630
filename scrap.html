<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Placeholder Text</h1>
    <button onclick="changeText()">Click Here</button>

    <script>
         function changeText(){
        let newMessage = "Working Button";
        document.getElementById("title").textContent = newMessage;
    }
    </script>
</body>
</html>
